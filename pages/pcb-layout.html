<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="PCB layout checklist — 41 items across 7 categories covering placement, routing, DRC and fabrication.">
  <title>PCB Layout Checklist — PCB Design Checklists</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

  <header class="site-header">
    <div>
      <div class="site-title">PCB Design Checklists</div>
    </div>
    <a href="../index.html" class="back-link">&#8592; All Checklists</a>
  </header>

  <main>
    <h1 class="page-title">PCB Layout Checklist</h1>
    <p class="page-desc">41 items across 7 categories — Board Setup, Component Placement, Routing, Signal Integrity, Power Distribution, Silkscreen &amp; Fabrication and DRC.</p>
    <div id="checklist-container"></div>
  </main>

  <script src="../assets/js/csv-loader.js"></script>
  <script>
    PCBChecklists.renderChecklist({
      csvUrl:      '../checklists/csv/pcb_layout_checklist.csv',
      groupKey:    'category',
      textKey:     'item',
      statusKeys:  [{ key: 'status', label: 'Status' }],
      extraCols:   [{ key: 'notes',  label: 'Notes'  }],
      containerId: 'checklist-container'
    });
  </script>

</body>
</html>
